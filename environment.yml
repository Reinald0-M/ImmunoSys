name: immunosys-env
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python>=3.9
  
  # Scientific Computing
  - numpy>=1.24
  - scipy>=1.10
  - sympy>=1.12
  
  # Data Analysis
  - pandas>=2.0
  
  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12
  - plotly>=5.14
  
  # 3D Visualization
  - mayavi>=4.8
  - pyvista>=0.40
  
  # Differential Equations & Modeling
  - scikit-learn>=1.3
  - networkx>=3.1
  
  # Jupyter Environment
  - jupyter>=1.0
  - jupyterlab>=4.0
  - notebook>=7.0
  - ipywidgets>=8.0
  - ipympl>=0.9
  
  # Development Tools
  - pytest>=7.4
  - black>=23.0
  - flake8>=6.0
  - mypy>=1.4
  
  # Documentation
  - sphinx>=7.0
  - sphinx_rtd_theme>=1.3
  
  # Additional tools via pip
  - pip>=23.0
  - pip:
    - tqdm>=4.65
    - pydantic>=2.0
    - pyyaml>=6.0
